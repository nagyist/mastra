name: Prebuild

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 0.x]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect code changes
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
    outputs:
      has_code: ${{ steps.filter.outputs.has_code }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} \
            | grep -vE '^(docs/|examples/|\.changeset/|explorations/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
          else
            echo "has_code=false" >> $GITHUB_OUTPUT
          fi

  prebuild:
    name: Build
    needs: changes
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_TOKEN == '' && 'local:rw' || 'remote:rw' }}
      NODE_OPTIONS: --max-old-space-size=8192
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache turbo build setup
        if: ${{ env.TURBO_TOKEN == '' }}
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*" build

  test-suite:
    name: Unit and E2E Tests
    needs: [changes, prebuild]
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    uses: ./.github/workflows/test-suite.yml
    permissions:
      actions: read
      contents: read
    with:
      head_sha: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.event.pull_request.base.ref }}
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
